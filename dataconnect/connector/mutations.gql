mutation RegisterHousehold(
  $name: String!
  $emoji: String!
  $color: String!
) @auth(level: USER_ANON) @transaction {
  household_insert(data: { createdAt_expr: "request.time", ownerUid_expr: "auth.uid" })
  user_insert(data: {
    householdId_expr: "response.household_insert.id",
    name: $name,
    emoji: $emoji,
    color: $color,
    role: "Admin",
    sortOrder: 0,
    createdAt_expr: "request.time"
  })
}

mutation AddHouseholdMember(
  $householdId: UUID!
  $name: String!
  $emoji: String!
  $color: String!
  $role: String!
  $sortOrder: Int!
) @auth(level: USER_ANON) @transaction {
  query @redact {
    households(where: { id: { eq: $householdId }, ownerUid: { eq_expr: "auth.uid" } }, limit: 1)
      @check(expr: "size(this) > 0", message: "Sin acceso al hogar") {
      id
    }
  }
  user_insert(data: {
    householdId: $householdId,
    name: $name,
    emoji: $emoji,
    color: $color,
    role: $role,
    sortOrder: $sortOrder,
    createdAt_expr: "request.time"
  })
}

mutation UpdateHouseholdMember(
  $householdId: UUID!
  $userId: UUID!
  $name: String!
  $emoji: String!
  $color: String!
  $role: String!
) @auth(level: USER_ANON) @transaction {
  query @redact {
    households(where: { id: { eq: $householdId }, ownerUid: { eq_expr: "auth.uid" } }, limit: 1)
      @check(expr: "size(this) > 0", message: "Sin acceso al hogar") {
      id
    }
  }
  user_update(
    first: { where: { id: { eq: $userId }, household: { id: { eq: $householdId } } } },
    data: {
      name: $name,
      emoji: $emoji,
      color: $color,
      role: $role
    }
  )
}

mutation DeleteHouseholdMember($householdId: UUID!, $userId: UUID!) @auth(level: USER_ANON) @transaction {
  query @redact {
    households(where: { id: { eq: $householdId }, ownerUid: { eq_expr: "auth.uid" } }, limit: 1)
      @check(expr: "size(this) > 0", message: "Sin acceso al hogar") {
      id
    }
    targetUser: users(where: { id: { eq: $userId }, household: { id: { eq: $householdId } } }, limit: 1)
      @check(expr: "size(this) > 0", message: "Miembro no encontrado") {
      id
    }
  }
  expense_deleteMany(where: { user: { id: { eq: $userId } } })
  income_deleteMany(where: { user: { id: { eq: $userId } } })
  card_deleteMany(where: { user: { id: { eq: $userId } } })
  goal_deleteMany(where: { user: { id: { eq: $userId } } })
  monthHistory_deleteMany(where: { user: { id: { eq: $userId } } })
  user_delete(first: { where: { id: { eq: $userId }, household: { id: { eq: $householdId } } } })
}

mutation UpdateUserBudgets($userId: UUID!, $householdId: UUID!, $budgets: String!) @auth(level: USER_ANON) @transaction {
  query @redact {
