}

mutation InsertExpense(
  $householdId: UUID!
  $userId: UUID!
  $name: String!
  $amount: Float!
  $frequency: String!
  $category: String!
  $paid: Boolean!
  $dueDay: Int
) @auth(level: USER_ANON) @transaction {
  query @redact {
    access: households(where: { id: { eq: $householdId }, ownerUid: { eq_expr: "auth.uid" } }, limit: 1)
      @check(expr: "size(this) > 0", message: "Sin acceso") {
      id
    }
    targetUser: users(where: { id: { eq: $userId }, household: { id: { eq: $householdId } } }, limit: 1)
      @check(expr: "size(this) > 0", message: "Usuario inválido") {
      id
    }
  }
  expense_insert(data: {
    userId: $userId,
    name: $name,
    amount: $amount,
    frequency: $frequency,
    category: $category,
    paid: $paid,
    dueDay: $dueDay
  })
}

