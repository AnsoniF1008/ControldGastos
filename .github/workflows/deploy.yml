name: Deploy to Firebase Hosting

# Cada push a main (o ejecución manual) construye la app y la publica
# en Firebase Hosting. Requiere los secrets configurados en
# Settings → Secrets and variables → Actions (ver README de abajo).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # La config web de Firebase (VITE_FIREBASE_*) y VITE_API_URL viven en
      # .env.production (valores públicos del cliente). Por secret solo se
      # inyecta lo opcional que no se versiona.
      - name: Build
        run: npm run build
        env:
          VITE_ENABLE_PLAID: ${{ secrets.VITE_ENABLE_PLAID }}

      # Aplica el esquema/conector de Data Connect a Cloud SQL antes de publicar
      # el frontend, para que producción quede consistente (el front nuevo usa la
      # tabla Transaction). Es aditivo (schemaValidation COMPATIBLE), no borra
      # datos. La service account necesita los roles "Firebase Data Connect Admin"
      # y "Cloud SQL Client" además de los de Hosting.
      - name: Deploy Data Connect (schema + connector)
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$RUNNER_TEMP/fdc-sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/fdc-sa.json"
          npx -y firebase-tools@latest deploy --only dataconnect --force --non-interactive --project controldgastos

      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: controldgastos
